<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Admin · Alle Benutzerdaten (Passwort sichtbar)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 24px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 32px;
            margin-bottom: 32px;
        }
        h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #FFEAB0, #FFB845); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 12px; }
        .sub { color: #94a3b8; margin-top: 8px; }
        .stats-grid { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 32px; }
        .stat-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px 28px; flex: 1; min-width: 180px; }
        .stat-number { font-size: 2.5rem; font-weight: 800; color: #FFD966; }
        .stat-label { color: #94a3b8; margin-top: 8px; font-size: 0.85rem; }
        .table-container { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 32px; overflow: hidden; }
        .table-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; flex-wrap: wrap; gap: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .refresh-btn, .export-btn { background: linear-gradient(95deg, #ffb347, #ff9a2e); border: none; padding: 10px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .export-btn { background: rgba(255,255,255,0.1); color: white; }
        .search-box { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 40px; padding: 10px 20px; width: 280px; color: white; }
        .search-box::placeholder { color: #94a3b8; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px 20px; background: rgba(0,0,0,0.3); color: #FFD966; font-weight: 600; }
        td { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); color: #e2e8f0; font-size: 0.85rem; }
        tr:hover { background: rgba(255,255,255,0.05); }
        .password-cell { font-family: monospace; background: rgba(0,0,0,0.2); border-radius: 8px; display: inline-block; padding: 4px 8px; font-weight: 600; color: #FFD966; }
        .iban-cell { font-family: monospace; font-size: 0.75rem; }
        .loading-overlay { display: flex; justify-content: center; padding: 60px; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #FFD966; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px; color: #94a3b8; }
        .footer { margin-top: 24px; text-align: center; color: #64748b; font-size: 0.75rem; }
        @media (max-width: 768px) { th, td { padding: 10px 12px; font-size: 0.7rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-database"></i> Firebase Admin Dashboard</h1>
        <div class="sub"><i class="fas fa-lock"></i> Alle Benutzerdaten inkl. Passwort und IBAN</div>
    </div>
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-number" id="userCount">0</div><div class="stat-label">Registrierte Benutzer</div></div>
        <div class="stat-card"><div class="stat-number" id="totalEarnedSum">0 €</div><div class="stat-label">Gesamt verdient</div></div>
        <div class="stat-card"><div class="stat-number" id="avgMultiplier">0x</div><div class="stat-label">Durchschnitt Multiplikator</div></div>
    </div>
    <div class="table-container">
        <div class="table-header">
            <div style="display: flex; gap: 12px;">
                <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Aktualisieren</button>
                <button class="export-btn" id="exportBtn"><i class="fas fa-download"></i> CSV Export</button>
            </div>
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 Suchen nach E-Mail, IBAN, Passwort...">
        </div>
        <div id="tableContent"><div class="loading-overlay"><div class="spinner"></div></div></div>
    </div>
    <div class="footer"><i class="fas fa-firebase"></i> Echtzeit-Datenbank · Passwörter sind im Klartext sichtbar (Demo)</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDLqBTvCidtm5Ql35hQKTFCuh6Wv6tqqNo",
        authDomain: "geldwebsitedaten.firebaseapp.com",
        databaseURL: "https://geldwebsitedaten-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "geldwebsitedaten",
        storageBucket: "geldwebsitedaten.firebasestorage.app",
        messagingSenderId: "252979186186",
        appId: "1:252979186186:web:cfb5156ea2ca7bdc1cedf3",
        measurementId: "G-8YJJEGZ2M1"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let allUsers = [];
    let filteredUsers = [];

    async function loadUserData() {
        document.getElementById('tableContent').innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
        const snapshot = await database.ref('users').once('value');
        const users = snapshot.val();
        allUsers = [];
        if (users) {
            for (const [userId, userData] of Object.entries(users)) {
                allUsers.push({
                    userId: userId,
                    email: userData.email || 'keine E-Mail',
                    password: userData.password || 'nicht gesetzt',
                    iban: userData.iban || 'nicht gesetzt',
                    baseRateCents: userData.baseRateCents || 0,
                    multiplier: userData.multiplier || 1,
                    totalEarned: userData.totalEarned || 0,
                    surveyCount: userData.surveyCompleted ? userData.surveyCompleted.filter(v => v === true).length : 0,
                    lastUpdated: userData.lastUpdated || 0
                });
            }
        }
        allUsers.sort((a, b) => b.lastUpdated - a.lastUpdated);
        document.getElementById('userCount').innerText = allUsers.length;
        document.getElementById('totalEarnedSum').innerText = allUsers.reduce((s, u) => s + (u.totalEarned || 0), 0).toLocaleString('de-DE', { minimumFractionDigits: 2 }) + ' €';
        document.getElementById('avgMultiplier').innerText = (allUsers.length ? (allUsers.reduce((s, u) => s + (u.multiplier || 1), 0) / allUsers.length).toFixed(2) : 0) + 'x';
        applyFilter();
    }

    function applyFilter() {
        const term = document.getElementById('searchBox').value.toLowerCase();
        filteredUsers = term ? allUsers.filter(u => 
            (u.email && u.email.toLowerCase().includes(term)) ||
            (u.userId && u.userId.toLowerCase().includes(term)) ||
            (u.iban && u.iban.toLowerCase().includes(term)) ||
            (u.password && u.password.toLowerCase().includes(term))
        ) : [...allUsers];
        renderTable();
    }

    function renderTable() {
        const container = document.getElementById('tableContent');
        if (filteredUsers.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i> Keine Benutzer gefunden</div>';
            return;
        }
        let html = `<table><thead><tr>
            <th>Benutzer-ID</th><th>E-Mail</th><th>Passwort</th><th>IBAN</th><th>Basisrate</th><th>Multiplikator</th><th>Verdient</th><th>Umfragen</th><th>Letzte Aktivität</th>
        </tr></thead><tbody>`;
        for (const u of filteredUsers) {
            const effRate = (u.baseRateCents * u.multiplier).toFixed(0);
            html += `<tr>
                <td class="user-id" style="font-family:monospace;font-size:0.7rem;">${escapeHtml(u.userId.substring(0, 25))}</td>
                <td><strong>${escapeHtml(u.email)}</strong></td>
                <td><span class="password-cell">${escapeHtml(u.password !== 'nicht gesetzt' ? u.password : '—')}</span></td>
                <td class="iban-cell">${escapeHtml(u.iban !== 'nicht gesetzt' ? u.iban : '—')}</td>
                <td>${u.baseRateCents} ct/s → ${effRate} ct/s</td>
                <td>${u.multiplier.toFixed(2)}x</td>
                <td>${u.totalEarned.toLocaleString('de-DE', { minimumFractionDigits: 2 })} €</td>
                <td>${u.surveyCount || 0} / 100</td>
                <td style="font-size:0.7rem;">${u.lastUpdated ? new Date(u.lastUpdated).toLocaleString('de-DE') : '—'}</td>
            </tr>`;
        }
        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    function exportCSV() {
        const headers = ['Benutzer-ID', 'E-Mail', 'Passwort', 'IBAN', 'Basisrate (ct/s)', 'Multiplikator', 'Gesamt verdient (€)', 'Beantwortete Umfragen'];
        const rows = filteredUsers.map(u => [u.userId, u.email, u.password, u.iban, u.baseRateCents, u.multiplier, u.totalEarned, u.surveyCount]);
        const csv = [headers, ...rows].map(row => row.map(c => `"${String(c).replace(/"/g, '""')}"`).join(';')).join('\n');
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'centquest_users.csv';
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    document.getElementById('refreshBtn').onclick = loadUserData;
    document.getElementById('exportBtn').onclick = exportCSV;
    document.getElementById('searchBox').oninput = applyFilter;
    loadUserData();
    setInterval(loadUserData, 10000);
</script>
</body>
</html>
